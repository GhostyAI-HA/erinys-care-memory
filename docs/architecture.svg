<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">ERINYS Care Memory Architecture</title>
  <desc id="desc">Architecture diagram showing React UI, FastAPI backend, ERINYS policy runtime, synthetic memory seed, and Qwen Cloud API.</desc>
  <rect width="1400" height="820" fill="#f7faf9"/>
  <text x="70" y="76" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#172126">ERINYS Care Memory Architecture</text>
  <text x="70" y="116" font-family="Inter, Arial, sans-serif" font-size="18" fill="#526068">Memory governance layer for Qwen Cloud agents</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38626b"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #cbdad8; stroke-width: 2; rx: 16; }
      .accent { fill: #e7f4f1; stroke: #6aa89d; }
      .danger { fill: #fff0ee; stroke: #e8a59c; }
      .title { font: 700 22px Inter, Arial, sans-serif; fill: #172126; }
      .body { font: 16px Inter, Arial, sans-serif; fill: #47565d; }
      .small { font: 14px Inter, Arial, sans-serif; fill: #607078; }
      .arrow { stroke: #38626b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="box accent" x="70" y="180" width="280" height="150"/>
  <text class="title" x="100" y="230">React Demo UI</text>
  <text class="body" x="100" y="268">Same prompt</text>
  <text class="body" x="100" y="296">Three answer strategies</text>

  <rect class="box" x="470" y="180" width="300" height="150"/>
  <text class="title" x="500" y="230">FastAPI Backend</text>
  <text class="body" x="500" y="268">/health</text>
  <text class="body" x="500" y="296">/run/benchmark</text>
  <text class="body" x="500" y="324">/run/governance</text>

  <rect class="box accent" x="900" y="150" width="350" height="210"/>
  <text class="title" x="930" y="205">ERINYS Policy Runtime</text>
  <text class="body" x="930" y="246">select current memories</text>
  <text class="body" x="930" y="276">demote stale routines</text>
  <text class="body" x="930" y="306">mark contradictions</text>
  <text class="body" x="930" y="336">block private identifiers</text>

  <rect class="box" x="90" y="505" width="310" height="165"/>
  <text class="title" x="120" y="555">Synthetic Memory Seed</text>
  <text class="body" x="120" y="594">31 safe demo memories</text>
  <text class="body" x="120" y="624">current, stale, private, noise</text>

  <rect class="box danger" x="520" y="505" width="300" height="165"/>
  <text class="title" x="550" y="555">Raw Memory Baseline</text>
  <text class="body" x="550" y="594">all retrieved memories</text>
  <text class="body" x="550" y="624">stale and private context leaks</text>

  <rect class="box accent" x="940" y="505" width="310" height="165"/>
  <text class="title" x="970" y="555">Qwen Cloud</text>
  <text class="body" x="970" y="594">OpenAI-compatible endpoint</text>
  <text class="body" x="970" y="624">qwen3.7-plus</text>

  <path class="arrow" d="M 350 255 L 465 255"/>
  <path class="arrow" d="M 770 255 L 895 255"/>
  <path class="arrow" d="M 245 505 L 245 365 L 620 365 L 620 335"/>
  <path class="arrow" d="M 620 335 L 900 255"/>
  <path class="arrow" d="M 1080 360 L 1080 500"/>
  <path class="arrow" d="M 770 300 C 870 390 880 500 935 580"/>
  <path class="arrow" d="M 820 585 L 935 585"/>

  <text class="small" x="390" y="238">user prompt</text>
  <text class="small" x="795" y="230">memories to govern</text>
  <text class="small" x="1000" y="430">selected context only</text>
  <text class="small" x="825" y="540">comparison path</text>
</svg>
